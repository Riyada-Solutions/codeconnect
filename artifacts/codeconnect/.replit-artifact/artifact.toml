kind = "mobile"
previewPath = "/"
title = "CodeConnect"
version = "1.0.0"
id = "artifacts/codeconnect"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19313

[services.development]
run = "pnpm --filter @workspace/codeconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codeconnect", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/codeconnect", "run", "serve" ]

[services.env]
PORT = "19313"
BASE_PATH = "/"
